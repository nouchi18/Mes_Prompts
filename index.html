<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptNouchi – Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <a href="#" class="logo">Prompt<span>Nouchi</span></a>
        <div id="counter">0 Prompt(s) affiché(s)</div>
    </header>

    <div class="container">
        <section class="hero">
            <h1>Ma Bibliothèque de Prompts</h1>
            <p>Gestion optimisée via database.js.</p>
        </section>

        <div class="search-container">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Rechercher un mot, un style...">
            </div>
        </div>

        <nav class="styles-section">
            <div class="styles-grid" id="styleFilterContainer">
                <div class="style-card active" data-filter="all"># Tous</div>
                <div class="style-card" data-filter="3d">3D</div>
                <div class="style-card" data-filter="portraits">Portraits</div>
                <div class="style-card" data-filter="femmes">Femmes</div>
                <div class="style-card" data-filter="fashions">Fashions</div>
                <div class="style-card" data-filter="hommes">Hommes</div>
                <div class="style-card" data-filter="sports">Sports</div>
                </div>
        </nav>

        <main class="prompts-grid" id="grid"></main>
    </div>

    <div id="promptModal" class="modal">
        <div class="modal-container">
            <span class="modal-close">&times;</span>
            
            <div class="modal-slider-wrapper">
                <button id="prevImg" class="slider-btn">❮</button>
                <img id="modalImg" src="" class="modal-img-main">
                <button id="nextImg" class="slider-btn">❯</button>
            </div>

            <div id="thumbnailContainer" class="thumbnail-list"></div>

            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <div id="modalDescription"></div>
                <button id="modalCopyBtn" class="btn-copy">Copier le prompt complet</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="modal-container admin-mode">
            <span class="modal-close" id="closeAdmin">&times;</span>
            <div class="modal-body">
                <h2 id="adminModalTitle">Gestion Database</h2>
                
                <div class="admin-form" id="adminForm">
                    <input type="text" id="adminTitle" placeholder="TITRE DU PROMPT">
                    <input type="text" id="adminStyles" placeholder="Styles (ex: portraits 3d femmes)">
                    <textarea id="adminImg" placeholder="Liens images (un lien par ligne)" rows="3"></textarea>
                    <textarea id="adminPrompt" placeholder="Texte du prompt..." rows="5"></textarea>
                    <button id="btnSaveAction" class="btn-copy">Générer le code</button>
                </div>

                <div id="generatedCodeSection" style="display:none; margin-top: 15px;">
                    <p style="color: var(--accent-color); font-size: 0.8rem; margin-bottom: 8px;">
                        ⚠️ Remplacez le contenu de <strong>database.js</strong> par ceci :
                    </p>
                    <textarea id="generatedCode" readonly onclick="this.select()"></textarea>
                    <button id="btnCopyDB" class="btn-copy" style="background: #10b981; margin-top: 10px;">Copier le code</button>
                </div>
            </div>
        </div>
    </div>

    <button id="openAdmin" class="btn-admin-float">+</button>
    <button id="closeAdminMode" class="btn-admin-float btn-exit-admin">✕</button>

    <script src="database.js"></script>
    <script src="script.js"></script>
</body>
</html>
