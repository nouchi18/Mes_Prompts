<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PromptNouchi – Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="#" class="logo">Prompt<span>Nouchi</span></a>
        <div id="counter">0 Prompt(s) affiché(s)</div>
    </header>

    <div class="container">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Rechercher un prompt...">
        </div>

        <nav class="styles-grid">
        <nav class="styles-section">
            <div class="styles-grid">
                <div class="style-card active" data-filter="all">
                    <span class="style-icon">#</span>Tous
                </div>
                <div class="style-card" data-filter="3d">
                    <span class="style-icon">3</span>D
                </div>
                <div class="style-card" data-filter="affiches">
                    <span class="style-icon">A</span>ffiches
                </div>
                <div class="style-card" data-filter="animaux">
                    <span class="style-icon">A</span>nimaux
                </div>
                <div class="style-card" data-filter="animes">
                    <span class="style-icon">A</span>nimes/Mangas
                </div>
                <div class="style-card" data-filter="anniversaires">
                    <span class="style-icon">A</span>nniversaires
                </div>
                <div class="style-card" data-filter="beautés">
                    <span class="style-icon">B</span>eautés
                </div>
                <div class="style-card" data-filter="caricatures">
                    <span class="style-icon">C</span>aricatures
                </div>
                <div class="style-card" data-filter="cinematiques">
                    <span class="style-icon">C</span>inématiques
                </div>
                <div class="style-card" data-filter="couples">
                    <span class="style-icon">C</span>ouples
                </div>
                <div class="style-card" data-filter="hommes">
                    <span class="style-icon">H</span>ommes
                </div>
                <div class="style-card" data-filter="familles">
                    <span class="style-icon">F</span>amilles
                </div>
                <div class="style-card" data-filter="fashions">
                    <span class="style-icon">F</span>ashions
                </div>
                <div class="style-card" data-filter="femmes">
                    <span class="style-icon">F</span>emmes
                </div>
                <div class="style-card" data-filter="paysages">
                    <span class="style-icon">P</span>aysages
                </div>
                <div class="style-card" data-filter="portraits">
                    <span class="style-icon">P</span>ortraits
                </div>
                <div class="style-card" data-filter="magazines">
                    <span class="style-icon">M</span>agazines
                </div>
                <div class="style-card" data-filter="rétros">
                    <span class="style-icon">R</span>étros
                </div>
                <div class="style-card" data-filter="sports">
                    <span class="style-icon">S</span>ports
                </div>
                <div class="style-card" data-filter="studios">
                    <span class="style-icon">S</span>tudios
                </div>
            </div>
        </nav>


        <main class="prompts-grid" id="grid"></main>
    </div>

    <div id="promptModal" class="modal">
        <div class="modal-container">
            <span class="modal-close">&times;</span>
            <div class="modal-slider-wrapper">
                <button id="prevImg" class="slider-btn">❮</button>
                <img id="modalImg" src="" class="modal-img-main">
                <button id="nextImg" class="slider-btn">❯</button>
            </div>
            <div id="thumbnailContainer" class="thumbnail-list"></div>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <div id="modalDescription"></div>
                <button id="modalCopyBtn" class="btn-copy">Copier le prompt</button>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal">
        <div class="modal-container">
            <span class="modal-close" id="closeAdmin">&times;</span>
            <div class="modal-body">
                <h2 id="adminModalTitle">Gestion Database</h2>
                <div class="admin-form" id="adminForm">
                    <input type="text" id="adminTitle" placeholder="Titre">
                    <input type="text" id="adminStyles" placeholder="Styles (ex: portraits 3d)">
                    <textarea id="adminImg" placeholder="Liens images (un par ligne)" rows="3"></textarea>
                    <textarea id="adminPrompt" placeholder="Texte du prompt..." rows="5"></textarea>
                    <button id="btnSaveAction" class="btn-copy">Générer le code</button>
                </div>
                <div id="generatedCodeSection" style="display:none; margin-top: 15px;">
                    <textarea id="generatedCode" readonly></textarea>
                    <button id="btnCopyDB" class="btn-copy" style="background: #10b981;">Copier le code final</button>
                </div>
            </div>
        </div>
    </div>

    <button id="openAdmin" class="btn-admin-float">+</button>
    <button id="closeAdminMode" class="btn-admin-float btn-exit-admin">✕</button>

    <script src="database.js"></script>
    <script src="script.js"></script>
</body>
</html>
